{{ define "main" }}

<h1>{{ .Site.Title }}</h1>

<div class="portfolio-list">

  {{ range where .Site.RegularPages "Section" "portfolio" }}

    {{ $cover := resources.Get (printf "%s/cover.jpeg" .Params.image_path) }}

    <a href="{{ .RelPermalink }}">

      {{ with $cover }}
        <img src="{{ .RelPermalink }}" width="300">
      {{ end }}

      <h2>{{ .Title }}</h2>

    </a>

  {{ end }}

</div>

{{ end }}
